version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    command: ["streamlit", "run", "resume_calibrator.py"]
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 2g
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
